[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = ["migrations", "staticfiles"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "DJ",  # flake8-django
    "S",   # flake8-bandit (security)
    "RUF", # ruff-specific
]
ignore = [
    "S101",  # use of assert (we use pytest)
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S105", "S106"]  # hardcoded passwords in tests are fine
"**/test_*.py" = ["S105", "S106"]
"**/settings/**" = ["F401", "F403"]  # star imports across settings are intentional

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]
