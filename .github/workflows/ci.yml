name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Opt into the Node 24 action runtime ahead of GitHub's June 2026 forced
# migration, so the deprecation warning clears and behaviour is locked in.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-test-key-not-for-production-use-only
      DJANGO_JWT_SIGNING_KEY: ci-test-jwt-key-not-for-production-use-only
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver

    steps:
      # Pinned to the latest v4/v5 majors; the Node24 env var above ensures
      # they run on the supported runtime. Bump these when v5/v6 land.
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run migrations (sanity)
        run: python manage.py migrate --noinput

      - name: Pytest
        run: pytest --cov=apps --cov-report=term-missing
